<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JobSwipe — אין חיבור לרשת</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
    }

    .emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }

    h1 {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: .5rem;
      background: linear-gradient(135deg, #f97316, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #64748b;
      font-size: .95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    button {
      background: linear-gradient(135deg, #f97316, #ec4899);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: .75rem;
      padding: .75rem 2rem;
      cursor: pointer;
      width: 100%;
      transition: opacity .15s;
    }
    button:hover { opacity: .9; }

    .brand {
      margin-top: 1.5rem;
      font-size: .85rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .3rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">📡</span>
    <h1>אין חיבור לרשת</h1>
    <p>נראה שאתה לא מחובר לאינטרנט כרגע.<br>בדוק את החיבור ונסה שוב.</p>
    <button onclick="location.reload()">נסה שוב 🔄</button>
    <div class="brand">💼❤️ JobSwipe</div>
  </div>
</body>
</html>
