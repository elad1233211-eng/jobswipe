[build]
# Use the project's Dockerfile (multi-stage, produces a slim image).
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run startup wrapper: seeds DB on first boot, then starts Next.js.
startCommand = "/bin/sh /app/scripts/start.sh"

# Restart the service automatically if it crashes.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Health check — same endpoint used in the Dockerfile HEALTHCHECK.
healthcheckPath = "/api/health"
healthcheckTimeout = 120
